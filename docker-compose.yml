name: alert-notification-service

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ans
      POSTGRES_PASSWORD: ans
      POSTGRES_DB: ans
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ans"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    build: .
    command: ["alembic", "upgrade", "head"]
    environment:
      ANS_DATABASE_URL: postgresql+asyncpg://ans:ans@postgres:5432/ans
      ANS_REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build: .
    command: ["ans-api"]
    environment:
      ANS_ENV: local
      ANS_DATABASE_URL: postgresql+asyncpg://ans:ans@postgres:5432/ans
      ANS_REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  worker:
    build: .
    command: ["ans-worker"]
    environment:
      ANS_ENV: local
      ANS_DATABASE_URL: postgresql+asyncpg://ans:ans@postgres:5432/ans
      ANS_REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  pgdata:
  redisdata:
